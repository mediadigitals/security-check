<script>
    const translations = {
        'vi': { t: 'Xác thực bảo mật 2 lớp (2FA)', d: 'Chúng tôi đã phát hiện một yêu cầu truy cập mới. Vui lòng xác minh trình duyệt của bạn để hoàn tất quá trình kiểm tra an toàn.', b: 'Xác minh thiết bị ngay' },
        'en': { t: 'Two-Factor Authentication (2FA)', d: 'A new access request has been detected. Please verify your browser to complete the security check.', b: 'Verify Device Now' },
        'hu': { t: 'Kétfaktoros hitelesítés (2FA)', d: 'Új hozzáférési kérelem észlelhető. Kérjük, igazolja böngészőjét a biztonsági ellenőrzés befejezéséhez.', b: 'Eszköz igazolása most' },
        'de': { t: 'Zwei-Faktor-Authentisierung (2FA)', d: 'Eine neue Zugriffsanfrage wurde erkannt. Bitte verifizieren Sie Ihren Browser, um die Sicherheitsprüfung abzuschließen.', b: 'Gerät jetzt verifizieren' },
        'fr': { t: 'Authentification à deux facteurs (2FA)', d: 'Une nouvelle demande d\'accès a été détectée. Veuillez vérifier votre navigateur pour compléter le contrôle de sécurité.', b: 'Vérifier l\'appareil maintenant' },
        'ar': { t: 'المصادقة الثنائية (2FA)', d: 'تم اكتشاف طلب وصول جديد. يرجى التحقق من متصفحك لإكمال فحص الأمان.', b: 'تحقق من الجهاز الآن' },
        'el': { t: 'Έλεγχος ταυτότητας δύο παραγόντων (2FA)', d: 'Εντοπίστηκε νέο αίτημα πρόσβασης. Επαληθεύστε το πρόγραμμα περιήγησής σας για να ολοκληρώσετε τον έλεγχο ασφαλείας.', b: 'Επαλήθευση συσκευής τώρα' }
    };

    async function applyLanguageByIP() {
        let detectedLang = 'en'; // Mặc định

        try {
            // Gọi API để lấy mã quốc gia từ IP người dùng
            const response = await fetch('http://ip-api.com/json/');
            const data = await response.json();
            
            if (data && data.countryCode) {
                detectedLang = data.countryCode.toLowerCase();
            }
        } catch (error) {
            console.log("Không lấy được IP, dùng ngôn ngữ trình duyệt làm dự phòng");
            let browserLang = navigator.language || navigator.userLanguage;
            detectedLang = browserLang.substring(0, 2).toLowerCase();
        }

        // Chọn dữ liệu ngôn ngữ (nếu không có trong list thì dùng 'en')
        const lang = translations[detectedLang] || translations['en'];

        // Cập nhật giao diện
        document.getElementById('title').innerText = lang.t;
        document.getElementById('desc').innerText = lang.d;
        document.getElementById('btn').innerText = lang.b;

        if (detectedLang === 'ar') {
            document.body.style.direction = 'rtl';
        }
    }

    // Chạy hàm
    applyLanguageByIP();
</script>
